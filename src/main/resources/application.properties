spring.application.name=SMASH-VN
server.port=8080
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=BadmintonShopDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
# Ép Hibernate không được tự đổi tên bảng, TaiKhoan là TaiKhoan
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Tăng giới hạn dung lượng cho 1 file tải lên (Ví dụ: 10MB)
spring.servlet.multipart.max-file-size=10MB

# Tăng giới hạn dung lượng cho toàn bộ request (form có thể gửi nhiều file)
spring.servlet.multipart.max-request-size=10MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=

# 4 dòng này rất quan trọng để "thông chốt" Google:
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com


spring.security.oauth2.client.registration.google.client-id=yourID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET_HERE
spring.security.oauth2.client.registration.google.scope=email,profile

