<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard Kiểm Tra Dữ Liệu</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .header { text-align: center; margin-bottom: 30px; }
        .container { display: flex; gap: 20px; }
        .box { flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #00ffff; color: #333; }
        h3 { margin-top: 0; color: #333; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Bảng Điều Khiển Admin (Test Dữ Liệu)</h1>
        <p>Kiểm tra kết nối Database -> Java Spring Boot</p>
    </div>

    <div class="container">
        <div class="box">
            <h3>Danh sách Tài Khoản</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Vai Trò</th>
                        <th>Trạng Thái</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tk : ${danhSachTaiKhoan}">
                        <td th:text="${tk.id}"></td>
                        <td th:text="${tk.email}"></td>
                        <td th:text="${tk.vaiTro}"></td>
                        <td th:text="${tk.trangThai}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="box">
            <h3>Danh sách Sản Phẩm (Gốc)</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên Sản Phẩm</th>
                        <th>Danh Mục</th>
                        <th>Thương Hiệu</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sp : ${danhSachSanPham}">
                        <td th:text="${sp.id}"></td>
                        <td th:text="${sp.tenSanPham}"></td>
                        <td th:text="${sp.danhMuc.tenDanhMuc}"></td> 
                        <td th:text="${sp.thuongHieu.tenThuongHieu}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
