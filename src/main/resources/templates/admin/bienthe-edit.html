<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa Phân Loại - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
<div class="container mt-5 mb-5">
    
    <div class="card shadow border-warning">
        <div class="card-header bg-warning text-dark fw-bold d-flex justify-content-between align-items-center">
            <span><i class="fas fa-edit"></i> SỬA PHÂN LOẠI: <span th:text="${sp.tenSanPham}">Tên SP</span></span>
            <a th:href="@{/admin/san-pham/{id}/bien-the(id=${sp.id})}" class="btn btn-sm btn-dark">
                <i class="fas fa-arrow-left"></i> Hủy & Quay lại
            </a>
        </div>
        <div class="card-body bg-light">
            <div th:if="${param.loi != null}" class="alert alert-danger">Đã xảy ra lỗi khi cập nhật biến thể!</div>

            <form th:action="@{/admin/san-pham/{idSP}/bien-the/sua/{idBT}(idSP=${sp.id}, idBT=${bt.id})}" method="post" enctype="multipart/form-data">
                
                <div class="row mb-4">
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Giá bán (VNĐ) *</label>
                        <input type="number" name="giaBan" class="form-control" th:value="${bt.giaBan}" required min="1000" step="1000">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Số lượng kho *</label>
                        <input type="number" name="soLuongTon" class="form-control" th:value="${bt.soLuongTon}" required min="0">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Hình ảnh sản phẩm (Để trống nếu giữ ảnh cũ)</label>
                        <input type="file" name="fileAnh" class="form-control" accept="image/*">
                        
                        <div class="mt-2 d-flex align-items-center" th:if="${bt.hinhAnhSanPham != null}">
                            <small class="text-muted me-2">Ảnh hiện tại:</small>
                            <img th:src="@{'/uploads/product/' + ${bt.hinhAnhSanPham}}" alt="Ảnh SP" 
                                 style="height: 60px; width: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #ccc;">
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Màu sắc *</label>
                        <input type="text" name="mauSac" class="form-control" th:value="${bt.mauSac}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Trọng lượng / Size *</label>
                        <input type="text" name="trongLuong" class="form-control" th:value="${bt.trongLuong}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Mức căng (Vợt)</label>
                        <input type="text" name="mucCang" class="form-control" th:value="${bt.mucCang}">
                    </div>
                </div>

                <div class="text-center mt-2">
                    <button type="submit" class="btn btn-warning px-5 fw-bold text-dark"><i class="fas fa-save"></i> LƯU THAY ĐỔI</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
