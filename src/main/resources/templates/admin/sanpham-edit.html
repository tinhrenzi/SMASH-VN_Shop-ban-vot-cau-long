<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa sản phẩm - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Sửa Thông Tin Sản Phẩm Gốc</h4>
            <a th:href="@{/admin/san-pham}" class="btn btn-sm btn-light">Quay lại danh sách</a>
        </div>
        <div class="card-body">
            <div th:if="${param.loi != null}" class="alert alert-danger" th:text="${param.loi}">Đã xảy ra lỗi!</div>

            <form th:action="@{/admin/san-pham/sua/{id}(id=${sp.id})}" method="post">
                
                <h5 class="text-primary border-bottom pb-2">Thông tin chung</h5>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tên Sản Phẩm *</label>
                        <input type="text" name="tenSanPham" class="form-control" th:value="${sp.tenSanPham}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Danh Mục *</label>
                        <select name="idDanhMuc" class="form-select" required>
                            <option value="">-- Chọn --</option>
                            <option th:each="dm : ${listDanhMuc}" 
                                    th:value="${dm.id}" 
                                    th:text="${dm.tenDanhMuc}"
                                    th:selected="${dm.id == sp.danhMuc.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Thương Hiệu *</label>
                        <select name="idThuongHieu" class="form-select" required>
                            <option value="">-- Chọn --</option>
                            <option th:each="th : ${listThuongHieu}" 
                                    th:value="${th.id}" 
                                    th:text="${th.tenThuongHieu}"
                                    th:selected="${th.id == sp.thuongHieu.id}"></option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Mô tả sản phẩm</label>
                    <textarea name="moTa" class="form-control" rows="4" th:text="${sp.moTa}" required></textarea>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-warning btn-lg px-5 text-dark fw-bold"><i class="fas fa-edit me-2"></i> CẬP NHẬT SẢN PHẨM GỐC</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
