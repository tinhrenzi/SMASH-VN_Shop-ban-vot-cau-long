<!DOCTYPE html>
<html class="no-js" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <!--[if IE]><meta http-equiv="X-UA-Compatible" content="IE=edge"><![endif]-->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link th:href="@{/images/favicon.png}" rel="shortcut icon">
    <title>Smash Vn - Reset Password</title>

    <!--====== Phông chữ Google ======-->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700,800" rel="stylesheet">

    <!--====== CSS Nhà cung cấp ======-->
    <link rel="stylesheet" th:href="@{/css/vendor.css}">

    <!--====== Tiện ích khoảng cách ======-->
    <link rel="stylesheet" th:href="@{/css/utility.css}">

    <!--====== Ứng dụng ======-->
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="config">
    <div class="preloader is-active">
        <div class="preloader__wrap">

            <img class="preloader__img" th:src="@{/images/preloader.png}" alt="">
        </div>
    </div>

    <div id="app">

        <!--====== Tiêu đề chính ======-->
        <header class="header--style-1">
            <div th:replace="~{layout/header :: header}"></div>
        </header>
        <!--====== End - Main Header ======-->


        <!--====== App Content ======-->
        <div class="app-content">

            <!--====== Section 1 ======-->
            <div class="u-s-p-y-60">

                <!--====== Section Content ======-->
                <div class="section__content">
                    <div class="container">
                        <div class="breadcrumb">
                            <div class="breadcrumb__wrap">
                                <ul class="breadcrumb__list">
                                    <li class="has-separator">

                                        <a th:href="@{/}">Home</a></li>
                                    <li class="is-marked">

                                        <a th:href="@{/user/quen-mat-khau}">Reset</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!--====== End - Section 1 ======-->


            <!--====== Section 2 ======-->
            <div class="u-s-p-b-60">

                <!--====== Section Intro ======-->
                <div class="section__intro u-s-m-b-60">
                    <div class="container">
                        <div class="row">
                            <div class="col-lg-12">
                                <div class="section__text-wrap">
                                    <h1 class="section__heading u-c-secondary">QUÊN MẬT KHẨU?</h1>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!--====== End - Section Intro ======-->


                <!--====== Section Content ======-->
                <div class="section__content">
                    <div class="container">
                        <div class="row row--center">
                            <div class="col-lg-6 col-md-8 u-s-m-b-30">
                                <div class="l-f-o">
                                    <div class="l-f-o__pad-box">
                                        <h1 class="gl-h1">ĐẶT LẠI MẬT KHẨU</h1>

                                        <span class="gl-text u-s-m-b-30">Xác nhận mật khẩu mới.</span>
                                        
                                        <div th:if="${thongBao != null}" class="alert alert-success" style="color: green; font-weight: bold; margin-bottom: 20px;">
										    <i class="fas fa-check-circle"></i> <span th:text="${thongBao}"></span>
										</div>
										
										<div th:if="${loi != null}" class="alert alert-danger" style="color: red; font-weight: bold; margin-bottom: 20px;">
										    <i class="fas fa-exclamation-triangle"></i> <span th:text="${loi}"></span>
										</div>
										
										<form class="l-f-o__form" th:action="@{/user/dat-lai-mat-khau}" method="post">
										    <input type="hidden" name="token" th:value="${token}">
										    
										    <div class="u-s-m-b-30">
										        <label class="gl-label" for="reset-pass">MẬT KHẨU MỚI *</label>
										        <input class="input-text input-text--primary-style" type="password" id="reset-pass" name="matKhauMoi" required>
										    </div>
										    
										    <div class="u-s-m-b-30">
										        <label class="gl-label" for="reset-pass-confirm">XÁC NHẬN MẬT KHẨU *</label>
										        <input class="input-text input-text--primary-style" type="password" id="reset-pass-confirm" name="xacNhanMatKhau" required>
										    </div>
										    
										    <div class="gl-inline">
										        <div class="u-s-m-b-30">
										            <button class="btn btn--e-transparent-brand-b-2" type="submit">ĐỔI MẬT KHẨU</button>
										        </div>
										    </div>
										</form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!--====== End - Section Content ======-->
            </div>
            <!--====== End - Section 2 ======-->
        </div>
        <!--====== End - App Content ======-->


        <!--====== Main Footer ======-->
        <footer th:replace="~{layout/footer :: footer}"></footer>
        <div th:replace="~{layout/modals :: all-modals}"></div>
    </div>
    <!--====== End - Main App ======-->


    <!--====== Google Analytics: change UA-XXXXX-Y to be your site's ID ======-->
    <script>
        window.ga = function() {
            ga.q.push(arguments)
        };
        ga.q = [];
        ga.l = +new Date;
        ga('create', 'UA-XXXXX-Y', 'auto');
        ga('send', 'pageview')
    </script>
    <script src="https://www.google-analytics.com/analytics.js" async defer></script>

    <!--====== Vendor Js ======-->
    <script th:src="@{/js/vendor.js}"></script>

    <!--====== Plugin jQuery Shopnav ======-->
    <script th:src="@{/js/jquery.shopnav.js}"></script>

    <!--====== Ứng dụng ======-->
    <script th:src="@{/js/app.js}"></script>

    <!--====== Khi không hỗ trợ JavaScript ======-->
    <noscript>
        <div class="app-setting">
            <div class="container">
                <div class="row">
                    <div class="col-12">
                        <div class="app-setting__wrap">
                            <h1 class="app-setting__h1">JavaScript is disabled in your browser.</h1>

                            <span class="app-setting__text">Please enable JavaScript in your browser or upgrade to a JavaScript-capable browser.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </noscript>
</body>
</html>
