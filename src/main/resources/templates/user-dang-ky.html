<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - SmashVN</title>
    <style>
        /* CSS nội bộ cơ bản để form dễ nhìn hơn một chút */
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-container { border: 1px solid #ccc; padding: 20px; width: 300px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .error-message { color: red; margin-bottom: 15px; font-weight: bold; }
        button { padding: 10px 15px; background-color: #00ffff; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Đăng Ký SmashVN</h2>

        <div th:if="${loi != null}" class="error-message">
            <p th:text="${loi}"></p>
        </div>

        <form th:action="@{/user/dang-ky}" method="post">
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Nhập email của bạn (*)">
            </div>

            <div class="form-group">
                <label for="matKhau">Mật khẩu:</label>
                <input type="password" id="matKhau" name="matKhau" required placeholder="Nhập mật khẩu">
            </div>

            <div class="form-group">
                <label for="xacNhanMatKhau">Nhập lại mật khẩu:</label>
                <input type="password" id="xacNhanMatKhau" name="xacNhanMatKhau" required placeholder="Nhập lại mật khẩu">
            </div>

            <button type="submit">Đăng ký</button>
        </form>

        <p>Đã có tài khoản? <a href="/user/dang-nhap">Đăng nhập tại đây</a></p>
    </div>

</body>
</html>
