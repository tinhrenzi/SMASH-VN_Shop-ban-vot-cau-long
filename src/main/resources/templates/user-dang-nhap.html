<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - SmashVN</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-container { border: 1px solid #ccc; padding: 20px; width: 300px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .error-message { color: red; margin-bottom: 15px; font-weight: bold; }
        .success-message { color: green; margin-bottom: 15px; font-weight: bold; }
        button { padding: 10px 15px; background-color: #00ffff; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Đăng Nhập SmashVN</h2>

        <div th:if="${loi != null}" class="error-message">
            <p th:text="${loi}"></p>
        </div>

        <div th:if="${param.thanhcong != null}" class="success-message">
            <p>Đăng ký thành công! Vui lòng đăng nhập.</p>
        </div>

        <form th:action="@{/user/dang-nhap}" method="post">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Nhập email">
            </div>

            <div class="form-group">
                <label for="matKhau">Mật khẩu:</label>
                <input type="password" id="matKhau" name="matKhau" required placeholder="Nhập mật khẩu">
            </div>

            <button type="submit">Đăng nhập</button>
        </form>

        <div style="margin-top: 15px; font-size: 14px;">
            <a href="/user/quen-mat-khau">Quên mật khẩu</a> | 
            <a href="/user/dang-ky">Đăng ký tại đây</a>
        </div>
    </div>

</body>
</html>
